# Art Director + Critic rubric v3
version: 2026-04-28-v3-reference-lock

weights:
  product_fidelity: 0.32
  geometry_lock: 0.16
  commercial_clarity: 0.16
  russian_text_correctness: 0.12
  overlay_alignment: 0.10
  canvas_fill: 0.06
  visual_hierarchy: 0.04
  set_consistency: 0.02
  marketplace_safety: 0.02

hard_gates:
  product_fidelity_min: 8.5
  geometry_lock_min: 8.5
  overlay_alignment_min: 8.0
  canvas_fill_min: 8.0
  no_fake_cyrillic: true
  no_placeholder_cards_from_codex: true
  no_side_gutters: true
  no_wrong_quantity: true
  no_wrong_material: true
  no_unsafe_auto_marketing: true

review_questions:
  product_fidelity:
    - "产品本体是否与 primary_product_refs 一致：形状、颜色、材质、关键孔位/螺纹/针眼/包装？"
    - "数量/尺寸/包装是否与 SKU 事实一致？"
    - "产品是否被 AI 换成了同类但不同款？"
  geometry_lock:
    - "长宽比例是否一致？细长产品有没有变短、变胖、变厚？"
    - "轮廓是否与实物图一致？"
  commercial_clarity:
    - "买家 1 秒内能不能知道这张图回答的问题？"
    - "证据方式是否匹配卖点：尺寸、步骤、前后对比、材质、数量、场景？"
  russian_text_correctness:
    - "所有俄文是否来自 overlay_text.py，而不是图像模型胡写？"
    - "俄文是否大而短，主副层级清楚？"
  overlay_alignment:
    - "标题、角标、尺寸卡、步骤卡是否都在正确位置？"
    - "是否存在文本与卡片错位、文字溢出、缺字？"
  canvas_fill:
    - "是否 full-bleed 3:4？"
    - "左右是否有白边、黑边、截图边框或无意义 gutter？"
  visual_hierarchy:
    - "主标题、数字角标、产品、支持点有没有抢层级？"
    - "是否删除了弱信息和重复信息？"
  set_consistency:
    - "同一套图的色温、字体、角标、产品处理是否统一？"
  marketplace_safety:
    - "是否把限制类/锋利刀刃类商品标成 needs_human_review？"
    - "是否避免夸大无法证明的功效？"

retry_policy:
  if_product_changed:
    action: "rerun with primary_product_refs attached; use image edit/reference composite; preserve product mask"
  if_geometry_changed:
    action: "add product_geometry_lock ratio and rerun; prompt forbids shortening/fattening"
  if_text_bad:
    action: "regenerate plate with no text/no cards, then overlay again"
  if_overlay_misaligned:
    action: "adjust overlay_text_plan normalized boxes; do not let Codex draw placeholder boxes"
  if_side_gutters:
    action: "use full_bleed_cover and overlay_text.py --fit-mode cover"
  if_cluttered:
    action: "drop secondary bullets, keep one buyer question"
  if_wrong_palette:
    action: "switch to category_archetype palette"
  if_restricted:
    action: "stop automated high-conversion generation; write human review note"
