layout_paradigms:
  hero_spec_badge:
    when: "首图/主卖点/数量规格清晰"
    composition: "产品 55-70%，顶部大标题，左/右数字角标，包装或主物在中心，背景少道具。"
  size_spec:
    when: "尺寸、长度、宽度、容量、规格影响购买"
    composition: "白底或浅底，产品居中，2-4 条虚线/箭头，只有必要数字。"
  steps_123:
    when: "使用/安装/粘贴/替换需要解释"
    composition: "3 步，每步一张局部真实图，一个动作，一个短标题。"
  scene_grid:
    when: "适用对象多，买家担心不适配"
    composition: "2x2 或 1+3 网格，统一圆角卡片，标签短。"
  before_after:
    when: "效果可视觉展示"
    composition: "上下或左右对比，同角度同光线，标签 DO/POSLE 或 До/После。"
  material_macro:
    when: "材质、耐用、天然、柔软、吸附、金属质感是核心"
    composition: "局部微距 + 产品小全貌，文字少，背景用类目纹理。"
  quantity_pack:
    when: "数量/套装/包装是购买关键"
    composition: "包装 + 多件铺陈 + 大数字角标；不改变数量事实。"
  trust_closure:
    when: "最后一张收口品牌/品质/安心感"
    composition: "产品稳定居中，背景收敛，标题一句话，不堆新卖点。"

failure_modes:
  - id: ai_changes_product
    symptom: "产品变形、换色、换材质、数量变多/变少、包装文字乱改"
    fix: "改用 image edit/reference crop；底图 prompt 加 must preserve；critic 强制重跑。"
  - id: fake_cyrillic
    symptom: "俄文乱码、拉丁替换、字母缺失"
    fix: "Codex plate 禁止生成最终文字；所有文字 overlay。"
  - id: too_many_claims
    symptom: "像详情页截图，满屏小字"
    fix: "保留一个主问题，其他卖点分到别的 slot。"
  - id: wrong_palette
    symptom: "类目色温错，如鞋贴变工业黑、工具变柔和粉"
    fix: "按 category_archetype 选择 palette。"
  - id: generic_stock_scene
    symptom: "人物/场景好看但商品看不清"
    fix: "产品必须在每张图里有明确可见证据；场景图也要露出产品或动作。"
